<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSTM Mall — All Rooms</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap");
    *{font-family:"Inter",sans-serif;box-sizing:border-box;}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .room-card{animation:slideUp 0.4s ease both;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);cursor:pointer;}
    .room-card:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(124,58,237,0.15);}
    .pulse{animation:pulse 2s infinite;}
    .cat-btn.active{color:#7C3AED;border-bottom-color:#7C3AED;}
    .cat-btn{color:#9CA3AF;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;padding:12px 16px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
    .cat-btn:hover{color:#7C3AED;}
    input:focus{outline:none;box-shadow:0 0 0 3px rgba(124,58,237,0.15);}
  </style>
</head>
<body style="background:#F8F7FF;">
<div id="bstm-nav"></div>

<!-- HERO -->
<div style="background:linear-gradient(135deg,#7C3AED,#4F46E5);padding:48px 24px 64px;position:relative;overflow:hidden;">
  <div style="position:absolute;inset:0;opacity:0.08;"><svg width="100%" height="100%"><defs><pattern id="p" width="50" height="50" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1.5" fill="#fff"/></pattern></defs><rect width="100%" height="100%" fill="url(#p)"/></svg></div>
  <div style="position:relative;max-width:700px;margin:0 auto;text-align:center;">
    <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);padding:6px 16px;border-radius:50px;margin-bottom:16px;">
      <span style="width:6px;height:6px;background:#4ADE80;border-radius:50%;display:inline-block;" class="pulse"></span>
      <span style="color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;">BSTM DIGITAL MALL DIRECTORY</span>
    </div>
    <h1 style="font-size:clamp(32px,5vw,52px);font-weight:900;color:#fff;margin-bottom:12px;letter-spacing:-0.02em;">All 63 Rooms</h1>
    <p style="color:rgba(255,255,255,0.7);font-size:15px;margin-bottom:28px;">Every business has a room. Find yours.</p>
    <div style="display:flex;gap:10px;max-width:500px;margin:0 auto;">
      <input id="search-input" type="text" placeholder="Search rooms, businesses..." style="flex:1;padding:14px 18px;border-radius:14px;border:none;font-size:14px;font-weight:500;color:#1E1B4B;">
      <button onclick="doSearch()" style="background:#FBBF24;color:#1E1B4B;border:none;padding:14px 20px;border-radius:14px;font-weight:800;cursor:pointer;font-size:14px;">Search</button>
    </div>
  </div>
</div>

<!-- CATEGORY TABS -->
<div style="background:#fff;border-bottom:1px solid #EDE9FE;position:sticky;top:64px;z-index:50;">
  <div style="max-width:1280px;margin:0 auto;padding:0 20px;display:flex;overflow-x:auto;gap:0;" id="cat-tabs">
    <button class="cat-btn active" data-cat="all">All Rooms</button>
    <button class="cat-btn" data-cat="open">✅ Open Now</button>
    <button class="cat-btn" data-cat="food">🌾 Food</button>
    <button class="cat-btn" data-cat="tech">📱 Tech</button>
    <button class="cat-btn" data-cat="fashion">👗 Fashion</button>
    <button class="cat-btn" data-cat="art">🎨 Art</button>
    <button class="cat-btn" data-cat="transport">🚕 Transport</button>
    <button class="cat-btn" data-cat="services">⚙️ Services</button>
    <button class="cat-btn" data-cat="coming">🔜 Coming Soon</button>
    <div style="flex:1;"></div>
    <span id="room-count" style="align-self:center;font-size:11px;color:#C4B5FD;font-weight:600;padding:0 8px;white-space:nowrap;"></span>
  </div>
</div>

<!-- ROOMS GRID -->
<div style="max-width:1280px;margin:0 auto;padding:32px 20px 60px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
    <h2 style="font-size:22px;font-weight:900;color:#1E1B4B;">Mall Directory</h2>
    <a href="seller-dashboard.html" style="background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;padding:10px 20px;border-radius:12px;font-weight:700;font-size:13px;text-decoration:none;box-shadow:0 4px 12px rgba(124,58,237,0.3);">+ Open Your Room</a>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;" id="rooms-grid"></div>
  <div id="no-results" style="display:none;text-align:center;padding:80px 20px;color:#C4B5FD;">
    <div style="font-size:56px;margin-bottom:12px;">🔍</div>
    <div style="font-size:18px;font-weight:700;color:#7C3AED;margin-bottom:6px;">No rooms found</div>
    <div style="font-size:13px;color:#9CA3AF;">Try adjusting your search or filter</div>
  </div>
</div>

<!-- OPEN YOUR ROOM -->
<div style="background:#1E1B4B;padding:60px 24px;text-align:center;">
  <h2 style="color:#fff;font-size:28px;font-weight:900;margin-bottom:8px;">Own a Business in Botswana?</h2>
  <p style="color:#A78BFA;margin-bottom:28px;font-size:15px;">Open your room. Sell to thousands. Earn THB on every transaction.</p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
    <a href="seller-dashboard.html" style="background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;padding:14px 32px;border-radius:14px;font-weight:800;text-decoration:none;box-shadow:0 6px 20px rgba(124,58,237,0.4);">Open My Room →</a>
    <a href="upload-product.html" style="background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.25);padding:14px 32px;border-radius:14px;font-weight:700;text-decoration:none;">List a Product</a>
  </div>
</div>

<div id="bstm-footer"></div>
<script src="components/smart-loader.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
