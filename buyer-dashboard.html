<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BSTM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50">
    
    <!-- Navigation -->
    <div id="bstm-nav"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        
        <!-- Welcome Section -->
        <div class="gradient-bg rounded-2xl shadow-xl p-6 sm:p-8 text-white mb-8">
            <h1 class="text-2xl sm:text-4xl font-bold mb-2">
                Welcome, <span id="userName">User</span>! 👋
            </h1>
            <p class="text-purple-100">Your BSTM Digital Nation Dashboard</p>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 mb-8">
            <div class="bg-white rounded-xl sm:rounded-2xl shadow-lg p-4 sm:p-6">
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-blue-100 rounded-lg flex items-center justify-center mb-3">
                    <i class="fas fa-shopping-bag text-blue-600 text-lg sm:text-xl"></i>
                </div>
                <p class="text-2xl sm:text-3xl font-bold text-gray-800" id="totalOrders">0</p>
                <p class="text-xs sm:text-sm text-gray-600">Total Orders</p>
            </div>

            <div class="bg-white rounded-xl sm:rounded-2xl shadow-lg p-4 sm:p-6">
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-yellow-100 rounded-lg flex items-center justify-center mb-3">
                    <i class="fas fa-coins text-yellow-600 text-lg sm:text-xl"></i>
                </div>
                <p class="text-2xl sm:text-3xl font-bold text-gray-800" id="thbBalance">50</p>
                <p class="text-xs sm:text-sm text-gray-600">THB Balance</p>
            </div>

            <div class="bg-white rounded-xl sm:rounded-2xl shadow-lg p-4 sm:p-6">
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-purple-100 rounded-lg flex items-center justify-center mb-3">
                    <i class="fas fa-heart text-purple-600 text-lg sm:text-xl"></i>
                </div>
                <p class="text-2xl sm:text-3xl font-bold text-gray-800" id="wishlistCount">0</p>
                <p class="text-xs sm:text-sm text-gray-600">Wishlist</p>
            </div>

            <div class="bg-white rounded-xl sm:rounded-2xl shadow-lg p-4 sm:p-6">
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-green-100 rounded-lg flex items-center justify-center mb-3">
                    <i class="fas fa-users text-green-600 text-lg sm:text-xl"></i>
                </div>
                <p class="text-2xl sm:text-3xl font-bold text-gray-800" id="referralCount">0</p>
                <p class="text-xs sm:text-sm text-gray-600">Referrals</p>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4 mb-8">
            <a href="index.html" class="bg-white rounded-xl shadow-lg p-4 sm:p-6 text-center hover:shadow-2xl transition-all active:scale-95">
                <div class="w-12 h-12 sm:w-14 sm:h-14 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-2 sm:mb-3">
                    <i class="fas fa-shopping-cart text-purple-600 text-xl sm:text-2xl"></i>
                </div>
                <p class="font-bold text-gray-800 text-sm sm:text-base">Browse</p>
            </a>

            <a href="thb-wallet.html" class="bg-white rounded-xl shadow-lg p-4 sm:p-6 text-center hover:shadow-2xl transition-all active:scale-95">
                <div class="w-12 h-12 sm:w-14 sm:h-14 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-2 sm:mb-3">
                    <i class="fas fa-wallet text-yellow-600 text-xl sm:text-2xl"></i>
                </div>
                <p class="font-bold text-gray-800 text-sm sm:text-base">Wallet</p>
            </a>

            <a href="wishlist.html" class="bg-white rounded-xl shadow-lg p-4 sm:p-6 text-center hover:shadow-2xl transition-all active:scale-95">
                <div class="w-12 h-12 sm:w-14 sm:h-14 bg-pink-100 rounded-full flex items-center justify-center mx-auto mb-2 sm:mb-3">
                    <i class="fas fa-heart text-pink-600 text-xl sm:text-2xl"></i>
                </div>
                <p class="font-bold text-gray-800 text-sm sm:text-base">Wishlist</p>
            </a>

            <a href="settings.html" class="bg-white rounded-xl shadow-lg p-4 sm:p-6 text-center hover:shadow-2xl transition-all active:scale-95">
                <div class="w-12 h-12 sm:w-14 sm:h-14 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-2 sm:mb-3">
                    <i class="fas fa-cog text-blue-600 text-xl sm:text-2xl"></i>
                </div>
                <p class="font-bold text-gray-800 text-sm sm:text-base">Settings</p>
            </a>
        </div>

        <!-- Recent Activity -->
        <div class="bg-white rounded-2xl shadow-lg p-6 sm:p-8 mb-8">
            <h2 class="text-xl sm:text-2xl font-bold text-gray-800 mb-6">Recent Orders</h2>
            <div id="recentOrders">
                <div class="text-center py-12">
                    <i class="fas fa-shopping-bag text-gray-300 text-5xl mb-4"></i>
                    <p class="text-gray-500">No orders yet</p>
                    <a href="index.html" class="inline-block mt-4 text-purple-600 hover:text-purple-800 font-semibold">
                        Start Shopping →
                    </a>
                </div>
            </div>
        </div>

        <!-- Seller CTA -->
        <div class="gradient-bg rounded-2xl shadow-lg p-6 sm:p-8 text-white">
            <div class="flex flex-col sm:flex-row items-center justify-between">
                <div class="mb-4 sm:mb-0">
                    <h3 class="text-xl sm:text-2xl font-bold mb-2">Want to start selling?</h3>
                    <p class="text-purple-100 mb-4 sm:mb-0">Join thousands of sellers and earn THB rewards</p>
                </div>
                <a href="kyc-verification.html" class="bg-white text-purple-600 hover:bg-purple-50 px-6 sm:px-8 py-3 rounded-xl font-bold whitespace-nowrap">
                    Become a Seller
                </a>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div id="bstm-footer"></div>

    <script>
    console.log('Dashboard loading...');
    
    function loadDashboard() {
        const userStr = localStorage.getItem('bstm_user');
        
        if (!userStr) {
            console.log('No user found, redirecting to login');
            window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname);
            return;
        }
        
        try {
            const user = JSON.parse(userStr);
            console.log('User loaded:', user.name);
            
            // Update user name
            const userNameEl = document.getElementById('userName');
            if (userNameEl) {
                userNameEl.textContent = user.name || 'User';
            }
            
            // Update THB balance
            const balanceEl = document.getElementById('thbBalance');
            if (balanceEl) {
                balanceEl.textContent = (user.thb_balance || 0).toFixed(1);
            }
            
            // Count wishlist
            const wishlist = JSON.parse(localStorage.getItem('bstm_wishlist') || '[]');
            const wishlistEl = document.getElementById('wishlistCount');
            if (wishlistEl) {
                wishlistEl.textContent = wishlist.length;
            }
            
            // Count orders
            const orders = JSON.parse(localStorage.getItem('bstm_orders') || '[]');
            const ordersEl = document.getElementById('totalOrders');
            if (ordersEl) {
                ordersEl.textContent = orders.length;
            }
            
        } catch (error) {
            console.error('Error loading dashboard:', error);
        }
    }

    function loadComponents() {
        fetch('components/universal-nav.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('bstm-nav').innerHTML = html;
                console.log('Nav loaded successfully');
            })
            .catch(err => console.error('Nav error:', err));

        fetch('components/universal-footer.html')
            .then(r => r.text())
            .then(html => document.getElementById('bstm-footer').innerHTML = html)
            .catch(err => console.error('Footer error:', err));
    }

    document.addEventListener('DOMContentLoaded', () => {
        console.log('DOM ready');
        loadDashboard();
        loadComponents();
    });
    </script>
</body>
</html>
