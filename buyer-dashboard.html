<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard - BSTM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    
    <!-- Top Bar -->
    <div class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">BSTM Dashboard</h1>
                <p class="text-purple-100 text-sm">Welcome, <span id="userName">Loading...</span></p>
            </div>
            <button onclick="logout()" class="bg-white text-purple-600 px-4 py-2 rounded-lg font-semibold hover:bg-purple-50 transition-all">
                <i class="fas fa-sign-out-alt mr-2"></i>Logout
            </button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center mb-3">
                    <i class="fas fa-shopping-bag text-blue-600 text-xl"></i>
                </div>
                <p class="text-3xl font-bold text-gray-800">0</p>
                <p class="text-sm text-gray-600">Orders</p>
            </div>

            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="w-12 h-12 bg-yellow-100 rounded-lg flex items-center justify-center mb-3">
                    <i class="fas fa-coins text-yellow-600 text-xl"></i>
                </div>
                <p class="text-3xl font-bold text-gray-800">50.0</p>
                <p class="text-sm text-gray-600">THB Balance</p>
            </div>

            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center mb-3">
                    <i class="fas fa-heart text-purple-600 text-xl"></i>
                </div>
                <p class="text-3xl font-bold text-gray-800">0</p>
                <p class="text-sm text-gray-600">Wishlist</p>
            </div>

            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center mb-3">
                    <i class="fas fa-star text-green-600 text-xl"></i>
                </div>
                <p class="text-3xl font-bold text-gray-800">5.0</p>
                <p class="text-sm text-gray-600">Rating</p>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <a href="index.html" class="bg-white rounded-xl shadow-lg p-6 text-center hover:shadow-2xl transition-all">
                <i class="fas fa-shopping-cart text-purple-600 text-3xl mb-3"></i>
                <p class="font-bold text-gray-800">Browse</p>
            </a>
            <a href="thb-wallet.html" class="bg-white rounded-xl shadow-lg p-6 text-center hover:shadow-2xl transition-all">
                <i class="fas fa-wallet text-yellow-600 text-3xl mb-3"></i>
                <p class="font-bold text-gray-800">Wallet</p>
            </a>
            <a href="wishlist.html" class="bg-white rounded-xl shadow-lg p-6 text-center hover:shadow-2xl transition-all">
                <i class="fas fa-heart text-pink-600 text-3xl mb-3"></i>
                <p class="font-bold text-gray-800">Wishlist</p>
            </a>
            <a href="settings.html" class="bg-white rounded-xl shadow-lg p-6 text-center hover:shadow-2xl transition-all">
                <i class="fas fa-cog text-blue-600 text-3xl mb-3"></i>
                <p class="font-bold text-gray-800">Settings</p>
            </a>
        </div>

        <!-- Welcome Card -->
        <div class="bg-gradient-to-r from-purple-600 to-indigo-600 rounded-2xl shadow-xl p-8 text-white">
            <h2 class="text-3xl font-bold mb-4">Welcome to BSTM! 🇧🇼</h2>
            <p class="text-lg mb-4">Start shopping and earn THB rewards on every purchase.</p>
            <a href="index.html" class="inline-block bg-white text-purple-600 px-6 py-3 rounded-lg font-bold hover:bg-purple-50">
                Start Shopping →
            </a>
        </div>

    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBlpLfL6ProXUrqhr9FGET7ACfPOKBudSw",
      authDomain: "gen-lang-client-0007945213.firebaseapp.com",
      projectId: "gen-lang-client-0007945213"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Protect this page - redirect to login if not signed in
    auth.onAuthStateChanged((user) => {
      if (!user) {
        console.log('❌ Not logged in, redirecting to login page');
        window.location.href = 'login.html';
      } else {
        console.log('✅ User authenticated:', user.email);
        document.getElementById('userName').textContent = user.displayName || user.email;
      }
    });

    // Logout function
    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        auth.signOut().then(() => {
          console.log('✅ Logged out successfully');
          window.location.href = 'login.html';
        }).catch((error) => {
          console.error('Logout error:', error);
          alert('Logout failed: ' + error.message);
        });
      }
    }
    </script>
</body>
</html>
