<!DOCTYPE html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTM Seller Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.5.0/dist/Recharts.js"></script>
</head>
<body>
    <div id="root"></div>

        ];

          { name: 'Electronics', value: 35, color: '#667eea' },
          { name: 'Fashion', value: 25, color: '#ec4899' },
          { name: 'Home', value: 20, color: '#10b981' },
          { name: 'Vehicles', value: 15, color: '#ef4444' },
          { name: 'Other', value: 5, color: '#f59e0b' },
        ];

          const [activeTab, setActiveTab] = useState('overview');

              {/* Header */}
              <div className="bg-gradient-to-r from-purple-600 to-indigo-600 text-white shadow-xl">
                <div className="max-w-7xl mx-auto px-6 py-4">
                  <div className="flex justify-between items-center">
                    <div className="flex items-center space-x-4">
                      <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center">

</body>
      </html>
