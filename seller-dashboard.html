<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - BSTM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    
    <div class="bg-gradient-to-r from-green-600 to-emerald-600 text-white py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Seller Dashboard</h1>
                <p class="text-green-100 text-sm">Welcome, <span id="userName">Loading...</span></p>
            </div>
            <button onclick="handleLogout()" class="bg-white text-green-600 px-4 py-2 rounded-lg font-semibold hover:bg-green-50">
                <i class="fas fa-sign-out-alt mr-2"></i>Logout
            </button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <p class="text-3xl font-bold text-gray-800">P0</p>
                <p class="text-sm text-gray-600">Total Revenue</p>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6">
                <p class="text-3xl font-bold text-gray-800">0</p>
                <p class="text-sm text-gray-600">Products Listed</p>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6">
                <p class="text-3xl font-bold text-gray-800">0</p>
                <p class="text-sm text-gray-600">Orders</p>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6">
                <p class="text-3xl font-bold text-gray-800" id="thbBalance">0.0</p>
                <p class="text-sm text-gray-600">THB Balance</p>
            </div>
        </div>

        <div class="bg-gradient-to-r from-green-600 to-emerald-600 rounded-2xl shadow-xl p-8 text-white">
            <h2 class="text-3xl font-bold mb-4">Start Selling on BSTM! 🚀</h2>
            <p class="text-lg mb-4">List your first product and reach thousands of buyers.</p>
            <button class="bg-white text-green-600 px-6 py-3 rounded-lg font-bold hover:bg-green-50">
                Add Product →
            </button>
        </div>

    </div>

    <script type="module">
    import './js/firebase-auth.js';

    window.BSTMAuth.requireAuth(['seller']).then(({ user, userData }) => {
        document.getElementById('userName').textContent = userData.name;
        document.getElementById('thbBalance').textContent = (userData.thb_balance || 0).toFixed(1);
    });

    window.handleLogout = async function() {
        if (confirm('Logout?')) await window.BSTMAuth.logout();
    };
    </script>
</body>
</html>
