<script>
// Mobile menu
function openMobileMenu() {
  document.getElementById('mobileMenu').classList.remove('hidden');
}
function closeMobileMenu() {
  document.getElementById('mobileMenu').classList.add('hidden');
}

// User menu
function toggleUserMenu() {
  document.getElementById('userMenu').classList.toggle('hidden');
}

// Load user data into nav
document.addEventListener('DOMContentLoaded', () => {
  const user = BSTMAuth.getCurrentUser();
  if (user) {
    document.getElementById('navUserName').textContent = user.name;
    document.getElementById('navUserEmail').textContent = user.email;
    if (user.avatar) {
      document.getElementById('navUserAvatar').src = user.avatar;
    }
  }
  
  // Load THB balance
  loadTHBBalance();
});

async function loadTHBBalance() {
  const user = BSTMAuth.getCurrentUser();
  if (user && user.thb_balance) {
    document.getElementById('navTHBBalance').textContent = user.thb_balance.toFixed(1);
  }
}
  </script>
