<!-- BSTM Universal Navigation - FULLY FUNCTIONAL -->
<style>
  .bstm-nav-mobile { display: none; }
  @media (max-width: 768px) {
    .bstm-nav-desktop { display: none !important; }
    .bstm-nav-mobile { display: flex !important; }
  }
  .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
</style>

<nav class="gradient-bg text-white sticky top-0 z-50 shadow-2xl">
  <div class="max-w-7xl mx-auto px-4 py-4">
    
    <!-- Desktop Navigation -->
    <div class="bstm-nav-desktop hidden md:flex items-center justify-between">
      <!-- Logo -->
      <a href="index.html" class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-yellow-400 rounded-xl flex items-center justify-center">
          <span class="text-purple-900 font-bold text-xl">B</span>
        </div>
        <div>
          <span class="font-bold text-lg">BSTM</span>
          <p class="text-xs text-purple-200">Digital Nation</p>
        </div>
      </a>
      
      <!-- Navigation Links -->
      <div class="flex items-center space-x-6 text-sm font-semibold">
        <a href="index.html" class="hover:text-yellow-300">🏪 Marketplace</a>
        <a href="room22-farm.html" class="hover:text-yellow-300">🌾 Farm</a>
        <a href="https://todd366.github.io/CabLink-pwa/" target="_blank" class="hover:text-yellow-300">🚗 CabLink</a>
        <a href="thb-wallet.html" class="hover:text-yellow-300">💰 Wallet</a>
        <a href="help.html" class="hover:text-yellow-300">❓ Help</a>
      </div>
      
      <!-- User Section -->
      <div id="navUserDesktop"></div>
    </div>
    
    <!-- Mobile Navigation -->
    <div class="bstm-nav-mobile flex md:hidden items-center justify-between">
      <button onclick="toggleMobileMenu()" class="text-white p-2">
        <i class="fas fa-bars text-2xl"></i>
      </button>
      
      <a href="index.html" class="flex items-center space-x-2">
        <div class="w-8 h-8 bg-yellow-400 rounded-lg flex items-center justify-center">
          <span class="text-purple-900 font-bold">B</span>
        </div>
        <span class="font-bold">BSTM</span>
      </a>
      
      <button onclick="window.location.href='notifications-all.html'" class="relative p-2">
        <i class="fas fa-bell text-xl"></i>
        <span id="notifBadgeMobile" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-xs flex items-center justify-center">3</span>
      </button>
    </div>
  </div>
</nav>

<!-- Mobile Menu Overlay -->
<div id="mobileMenuOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden" onclick="toggleMobileMenu()"></div>

<!-- Mobile Menu Drawer -->
<div id="mobileMenu" class="fixed top-0 left-0 h-full w-80 gradient-bg transform -translate-x-full transition-transform duration-300 z-50 overflow-y-auto">
  <div class="p-6">
    <!-- Close Button -->
    <div class="flex justify-between items-center mb-8">
      <span class="text-white font-bold text-2xl">Menu</span>
      <button onclick="toggleMobileMenu()" class="text-white">
        <i class="fas fa-times text-2xl"></i>
      </button>
    </div>
    
    <!-- Mobile Menu Content -->
    <div id="mobileMenuContent" class="space-y-2">
      <!-- Will be populated by JavaScript -->
    </div>
  </div>
</div>

<script>
(function() {
  console.log('Navigation script loaded');
  
  // Get current user
  function getCurrentUser() {
    try {
      const userStr = localStorage.getItem('bstm_user');
      return userStr ? JSON.parse(userStr) : null;
    } catch (e) {
      console.error('Error getting user:', e);
      return null;
    }
  }
  
  // Initialize navigation
  function initNav() {
    console.log('Initializing navigation...');
    
    const user = getCurrentUser();
    const desktopSection = document.getElementById('navUserDesktop');
    const mobileContent = document.getElementById('mobileMenuContent');
    
    if (!desktopSection || !mobileContent) {
      console.error('Nav elements not found');
      return;
    }
    
    if (user) {
      console.log('User logged in:', user.name);
      
      // Desktop user section
      desktopSection.innerHTML = `
        <div class="flex items-center space-x-4">
          <a href="thb-wallet.html" class="bg-yellow-400 text-purple-900 px-4 py-2 rounded-lg font-bold hover:bg-yellow-300">
            ${(user.thb_balance || 0).toFixed(1)} THB
          </a>
          <a href="buyer-dashboard.html" class="hover:bg-purple-800 px-3 py-2 rounded-lg">
            <i class="fas fa-user-circle text-2xl"></i>
          </a>
        </div>
      `;
      
      // Mobile menu for logged-in users
      mobileContent.innerHTML = `
        <div class="bg-purple-800 bg-opacity-50 rounded-xl p-4 mb-4">
          <p class="text-white font-bold text-lg">${user.name}</p>
          <p class="text-purple-200 text-sm">${user.email}</p>
          <div class="mt-3 bg-yellow-400 text-purple-900 px-4 py-2 rounded-lg font-bold text-center">
            ${(user.thb_balance || 0).toFixed(1)} THB
          </div>
        </div>
        
        <a href="index.html" class="block text-white text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          🏪 Marketplace
        </a>
        <a href="buyer-dashboard.html" class="block text-white text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          📊 Dashboard
        </a>
        <a href="wishlist.html" class="block text-white text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          ❤️ Wishlist
        </a>
        <a href="thb-wallet.html" class="block text-white text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          💰 THB Wallet
        </a>
        <a href="room22-farm.html" class="block text-white text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          🌾 Room 22 Farm
        </a>
        <a href="https://todd366.github.io/CabLink-pwa/" class="block text-white text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          🚗 CabLink
        </a>
        <a href="settings.html" class="block text-white text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          ⚙️ Settings
        </a>
        <a href="help.html" class="block text-white text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          ❓ Help
        </a>
        
        <div class="border-t border-purple-700 my-4"></div>
        
        <button onclick="handleLogout()" class="w-full text-left text-red-400 text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          🚪 Logout
        </button>
      `;
      
    } else {
      console.log('No user logged in');
      
      // Desktop - not logged in
      desktopSection.innerHTML = `
        <div class="flex items-center space-x-3">
          <a href="login.html" class="bg-yellow-400 text-purple-900 px-6 py-2 rounded-lg font-bold hover:bg-yellow-300">
            Login
          </a>
          <a href="login.html?tab=signup" class="bg-purple-700 hover:bg-purple-800 px-6 py-2 rounded-lg font-bold">
            Sign Up
          </a>
        </div>
      `;
      
      // Mobile menu - not logged in
      mobileContent.innerHTML = `
        <a href="index.html" class="block text-white text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          🏪 Marketplace
        </a>
        <a href="room22-farm.html" class="block text-white text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          🌾 Farm
        </a>
        <a href="https://todd366.github.io/CabLink-pwa/" class="block text-white text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          🚗 CabLink
        </a>
        <a href="help.html" class="block text-white text-lg py-3 px-4 rounded-lg hover:bg-purple-800">
          ❓ Help
        </a>
        
        <div class="border-t border-purple-700 my-4"></div>
        
        <a href="login.html" class="block bg-yellow-400 text-purple-900 text-lg py-3 px-4 rounded-lg font-bold text-center mb-2">
          🔐 Login
        </a>
        <a href="login.html?tab=signup" class="block bg-purple-700 text-white text-lg py-3 px-4 rounded-lg font-bold text-center">
          ✨ Sign Up
        </a>
      `;
    }
  }
  
  // Toggle mobile menu
  window.toggleMobileMenu = function() {
    const menu = document.getElementById('mobileMenu');
    const overlay = document.getElementById('mobileMenuOverlay');
    
    if (menu && overlay) {
      const isOpen = !menu.classList.contains('-translate-x-full');
      
      if (isOpen) {
        menu.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
      } else {
        menu.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
      }
    }
  };
  
  // Handle logout
  window.handleLogout = function() {
    if (confirm('Are you sure you want to logout?')) {
      localStorage.removeItem('bstm_user');
      localStorage.removeItem('bstm_session');
      window.location.href = 'login.html';
    }
  };
  
  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initNav);
  } else {
    initNav();
  }
  
  // Also init on load (backup)
  window.addEventListener('load', initNav);
  
  console.log('Navigation setup complete');
})();
</script>
