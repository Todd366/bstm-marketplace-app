<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BSTM Digital Nation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
        }
        
        .logo-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .logo-section h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .logo-section p {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
        }
        
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .form-section {
            padding: 30px;
        }
        
        .form-content {
            display: none;
        }
        
        .form-content.active {
            display: block;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 15px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-google {
            background: white;
            border: 2px solid #eee;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-google:hover {
            background: #f8f8f8;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #eee;
        }
        
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .success-message {
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
<script type="module" src="js/auth.js"></script>
</head>
<body>
    
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">B</div>
            <h1>BSTM</h1>
            <p>🇧🇼 Digital Nation</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('signup')">Sign Up</div>
        </div>
        
        <div class="form-section">
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Please wait...</p>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="form-content active">
                <form onsubmit="handleEmailLogin(event)">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required placeholder="your@email.com">
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required placeholder="••••••••">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                
                <div class="divider">or</div>
                
                <button onclick="handleGoogleLogin()" class="btn btn-google">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
                        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
                        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
                        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>
            
            <!-- Signup Form -->
            <div id="signupForm" class="form-content">
                <form onsubmit="handleEmailSignup(event)">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="signupName" required placeholder="John Doe">
                    </div>
                    
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="signupEmail" required placeholder="your@email.com">
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" required minlength="6" placeholder="••••••••">
                    </div>
                    
                    <div class="input-group">
                        <label>I want to:</label>
                        <select id="signupRole" required>
                            <option value="buyer">Buy products (Buyer)</option>
                            <option value="seller">Sell products (Seller)</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </form>
                
                <div class="divider">or</div>
                
                <button onclick="handleGoogleLogin()" class="btn btn-google">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
                        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
                        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
                        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
                    </svg>
                    Sign up with Google
                </button>
            </div>
        </div>

        <div class="back-link">
            <a href="index.html">← Back to Marketplace</a>
        </div>
    </div>

    <script type="module">
    // Import auth utilities
    import './js/firebase-auth.js';

    // Switch tabs
    window.switchTab = function(tab) {
        // Update tab styling
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        
        // Show/hide forms
        document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
        document.getElementById(tab + 'Form').classList.add('active');
        
        // Clear messages
        hideMessages();
    };

    // Handle email login
    window.handleEmailLogin = async function(event) {
        event.preventDefault();
        
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        showLoading();
        hideMessages();
        
        try {
            await window.BSTMAuth.signInWithEmail(email, password);
            // Redirect happens in firebase-auth.js
        } catch (error) {
            hideLoading();
            showError(error.message);
        }
    };

    // Handle email signup
    window.handleEmailSignup = async function(event) {
        event.preventDefault();
        
        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const role = document.getElementById('signupRole').value;
        
        showLoading();
        hideMessages();
        
        try {
            await window.BSTMAuth.signUpWithEmail(email, password, name, role);
            // Redirect happens in firebase-auth.js
        } catch (error) {
            hideLoading();
            showError(error.message);
        }
    };

    // Handle Google login
    window.handleGoogleLogin = async function() {
        showLoading();
        hideMessages();
        
        try {
            await window.BSTMAuth.signInWithGoogle();
            // Redirect happens in firebase-auth.js
        } catch (error) {
            hideLoading();
            if (error !== 'Sign-in cancelled') {
                showError(error.message);
            }
        }
    };

    // UI helpers
    function showLoading() {
        document.getElementById('loading').style.display = 'block';
        document.querySelectorAll('.btn').forEach(btn => btn.disabled = true);
    }

    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
        document.querySelectorAll('.btn').forEach(btn => btn.disabled = false);
    }

    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
    }

    function showSuccess(message) {
        const successDiv = document.getElementById('successMessage');
        successDiv.textContent = message;
        successDiv.style.display = 'block';
    }

    function hideMessages() {
        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('successMessage').style.display = 'none';
    }

    // Check if already logged in
    window.auth.onAuthStateChanged(user => {
        if (user && window.location.pathname.includes('login.html')) {
            console.log('User already logged in, redirecting...');
            window.BSTMAuth.redirectByRole(user);
        }
    });
    </script>
</body>
</html>
