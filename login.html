<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BSTM Digital Nation</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .tab-active { border-bottom: 3px solid #667eea; color: #667eea; }
    </style>
</head>
<body class="bg-gray-50">
    
    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="max-w-md w-full">
            
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 gradient-bg rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-bold text-3xl">B</span>
                </div>
                <h1 class="text-3xl font-bold text-gray-800">Welcome to BSTM</h1>
                <p class="text-gray-600">Africa's First Digital Nation</p>
            </div>

            <!-- Tabs -->
            <div class="bg-white rounded-t-2xl shadow-lg">
                <div class="flex border-b">
                    <button id="loginTab" onclick="switchTab('login')" class="tab-active flex-1 py-4 font-bold transition-all">
                        Login
                    </button>
                    <button id="signupTab" onclick="switchTab('signup')" class="flex-1 py-4 font-bold text-gray-600 transition-all">
                        Sign Up
                    </button>
                </div>

                <!-- Login Form -->
                <div id="loginForm" class="p-8">
                    <form onsubmit="handleLogin(event)">
                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Email</label>
                            <input type="email" id="loginEmail" required 
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600"
                                   placeholder="your@email.com">
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Password</label>
                            <input type="password" id="loginPassword" required 
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600"
                                   placeholder="••••••••">
                        </div>

                        <div class="flex items-center justify-between mb-6">
                            <label class="flex items-center">
                                <input type="checkbox" class="mr-2">
                                <span class="text-sm text-gray-600">Remember me</span>
                            </label>
                            <a href="#" class="text-sm text-purple-600 hover:text-purple-800">Forgot password?</a>
                        </div>

                        <button type="submit" class="w-full gradient-bg text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg transition-all mb-4">
                            Login
                        </button>

                        <div class="text-center text-gray-600 mb-4">or continue with</div>

                        <div class="grid grid-cols-2 gap-4">
                            <button type="button" onclick="handleGoogleLogin()" class="border-2 border-gray-300 py-3 rounded-xl font-semibold hover:bg-gray-50 transition-all">
                                <i class="fab fa-google mr-2 text-red-500"></i>Google
                            </button>
                            <button type="button" onclick="handleFacebookLogin()" class="border-2 border-gray-300 py-3 rounded-xl font-semibold hover:bg-gray-50 transition-all">
                                <i class="fab fa-facebook mr-2 text-blue-600"></i>Facebook
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Signup Form -->
                <div id="signupForm" class="p-8 hidden">
                    <form onsubmit="handleSignup(event)">
                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Full Name</label>
                            <input type="text" id="signupName" required 
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600"
                                   placeholder="John Doe">
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Email</label>
                            <input type="email" id="signupEmail" required 
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600"
                                   placeholder="your@email.com">
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Password</label>
                            <input type="password" id="signupPassword" required minlength="8"
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600"
                                   placeholder="••••••••">
                            <p class="text-xs text-gray-500 mt-1">Minimum 8 characters</p>
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">I want to:</label>
                            <select id="signupRole" required 
                                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600">
                                <option value="buyer">Buy products (Buyer)</option>
                                <option value="seller">Sell products (Seller)</option>
                            </select>
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Referral Code (Optional)</label>
                            <input type="text" id="signupReferral" 
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600"
                                   placeholder="BSTM-XXXX">
                        </div>

                        <div class="mb-6">
                            <label class="flex items-start">
                                <input type="checkbox" required class="mr-2 mt-1">
                                <span class="text-sm text-gray-600">
                                    I agree to the <a href="terms.html" class="text-purple-600 hover:underline">Terms of Service</a> 
                                    and <a href="terms.html#privacy" class="text-purple-600 hover:underline">Privacy Policy</a>
                                </span>
                            </label>
                        </div>

                        <button type="submit" class="w-full gradient-bg text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg transition-all mb-4">
                            Create Account
                        </button>

                        <div class="text-center text-gray-600 mb-4">or continue with</div>

                        <div class="grid grid-cols-2 gap-4">
                            <button type="button" onclick="handleGoogleLogin()" class="border-2 border-gray-300 py-3 rounded-xl font-semibold hover:bg-gray-50 transition-all">
                                <i class="fab fa-google mr-2 text-red-500"></i>Google
                            </button>
                            <button type="button" onclick="handleFacebookLogin()" class="border-2 border-gray-300 py-3 rounded-xl font-semibold hover:bg-gray-50 transition-all">
                                <i class="fab fa-facebook mr-2 text-blue-600"></i>Facebook
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <p class="text-center text-gray-600 mt-6">
                <a href="index.html" class="text-purple-600 hover:text-purple-800 font-semibold">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Marketplace
                </a>
            </p>
        </div>
    </div>

    <script>
    // Minimal auth system (works without external dependencies)
    const SimpleAuth = {
        login(email, password) {
            const user = {
                id: 'user_' + Date.now(),
                email: email,
                name: email.split('@')[0],
                role: 'buyer',
                thb_balance: 50,
                verified: false,
                avatar: null,
                created_at: new Date().toISOString()
            };
            
            localStorage.setItem('bstm_user', JSON.stringify(user));
            localStorage.setItem('bstm_session', Date.now().toString());
            return user;
        },
        
        signup(name, email, password, role, referralCode) {
            const user = {
                id: 'user_' + Date.now(),
                email: email,
                name: name,
                role: role,
                thb_balance: 50,
                verified: false,
                avatar: null,
                referral_code: 'BSTM-' + Math.random().toString(36).substr(2, 4).toUpperCase(),
                referred_by: referralCode || null,
                created_at: new Date().toISOString()
            };
            
            localStorage.setItem('bstm_user', JSON.stringify(user));
            localStorage.setItem('bstm_session', Date.now().toString());
            
            // Award referral bonus if code provided
            if (referralCode) {
                console.log('Referral code applied:', referralCode);
            }
            
            return user;
        },
        
        redirectByRole(user) {
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            
            if (redirect) {
                window.location.href = decodeURIComponent(redirect);
                return;
            }
            
            if (user.role === 'admin') {
                window.location.href = 'gov-dashboard.html';
            } else if (user.role === 'seller') {
                window.location.href = 'seller-dashboard.html';
            } else {
                window.location.href = 'buyer-dashboard.html';
            }
        }
    };

    function switchTab(tab) {
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');

        if (tab === 'login') {
            loginTab.classList.add('tab-active');
            loginTab.classList.remove('text-gray-600');
            signupTab.classList.remove('tab-active');
            signupTab.classList.add('text-gray-600');
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
        } else {
            signupTab.classList.add('tab-active');
            signupTab.classList.remove('text-gray-600');
            loginTab.classList.remove('tab-active');
            loginTab.classList.add('text-gray-600');
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        }
    }

    function handleLogin(event) {
        event.preventDefault();
        
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        try {
            const user = SimpleAuth.login(email, password);
            
            // Show success message
            showToast('Login successful! Redirecting...', 'success');
            
            // Redirect after 1 second
            setTimeout(() => {
                SimpleAuth.redirectByRole(user);
            }, 1000);
            
        } catch (error) {
            showToast('Login failed. Please try again.', 'error');
        }
    }

    function handleSignup(event) {
        event.preventDefault();
        
        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const role = document.getElementById('signupRole').value;
        const referralCode = document.getElementById('signupReferral').value;
        
        try {
            const user = SimpleAuth.signup(name, email, password, role, referralCode);
            
            // Show success message
            showToast('Account created! You earned 50 THB bonus. Redirecting...', 'success');
            
            // Redirect after 1.5 seconds
            setTimeout(() => {
                SimpleAuth.redirectByRole(user);
            }, 1500);
            
        } catch (error) {
            showToast('Signup failed. Please try again.', 'error');
        }
    }

    function handleGoogleLogin() {
        showToast('Google login coming soon! Use email login for now.', 'info');
    }

    function handleFacebookLogin() {
        showToast('Facebook login coming soon! Use email login for now.', 'info');
    }

    function showToast(message, type = 'info') {
        const colors = {
            success: 'bg-green-500',
            error: 'bg-red-500',
            info: 'bg-blue-500'
        };
        
        const toast = document.createElement('div');
        toast.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-4 rounded-xl shadow-2xl z-50 animate-fade-in`;
        toast.textContent = message;
        
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.remove();
        }, 4000);
    }

    // Check URL for tab parameter
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab');
        const ref = urlParams.get('ref');
        
        if (tab === 'signup') {
            switchTab('signup');
        }
        
        if (ref) {
            document.getElementById('signupReferral').value = ref;
            switchTab('signup');
        }
    });
    </script>

    <style>
    @keyframes fade-in {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    .animate-fade-in {
        animation: fade-in 0.3s ease-out;
    }
    </style>
</body>
</html>
