<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BSTM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    
    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="max-w-md w-full">
            
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-purple-600 to-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-bold text-3xl">B</span>
                </div>
                <h1 class="text-3xl font-bold text-gray-800">Welcome to BSTM</h1>
                <p class="text-gray-600">Africa's First Digital Nation</p>
            </div>

            <!-- Tabs -->
            <div class="bg-white rounded-t-2xl shadow-lg">
                <div class="flex border-b">
                    <button id="loginTab" onclick="switchTab('login')" class="flex-1 py-4 font-bold text-purple-600 border-b-2 border-purple-600">
                        Login
                    </button>
                    <button id="signupTab" onclick="switchTab('signup')" class="flex-1 py-4 font-bold text-gray-600">
                        Sign Up
                    </button>
                </div>

                <!-- Login Form -->
                <div id="loginForm" class="p-8">
                    <form onsubmit="handleLogin(event)">
                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Email</label>
                            <input type="email" id="loginEmail" required 
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600"
                                   placeholder="your@email.com">
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Password</label>
                            <input type="password" id="loginPassword" required 
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600"
                                   placeholder="••••••••">
                        </div>

                        <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg mb-4">
                            Login
                        </button>

                        <div class="text-center text-gray-600 mb-4">or</div>

                        <button type="button" onclick="handleGoogleLogin()" class="w-full border-2 border-gray-300 py-3 rounded-xl font-semibold hover:bg-gray-50 mb-2">
                            <i class="fab fa-google mr-2 text-red-500"></i>Continue with Google
                        </button>
                    </form>
                </div>

                <!-- Signup Form -->
                <div id="signupForm" class="p-8 hidden">
                    <form onsubmit="handleSignup(event)">
                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Full Name</label>
                            <input type="text" id="signupName" required 
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600">
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Email</label>
                            <input type="email" id="signupEmail" required 
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600">
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Password</label>
                            <input type="password" id="signupPassword" required minlength="6"
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600">
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">I want to:</label>
                            <select id="signupRole" required 
                                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-purple-600">
                                <option value="buyer">Buy products</option>
                                <option value="seller">Sell products</option>
                            </select>
                        </div>

                        <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg mb-4">
                            Create Account
                        </button>

                        <button type="button" onclick="handleGoogleLogin()" class="w-full border-2 border-gray-300 py-3 rounded-xl font-semibold hover:bg-gray-50">
                            <i class="fab fa-google mr-2 text-red-500"></i>Sign up with Google
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
    import FirebaseAuth from './js/firebase-auth.js';

    window.switchTab = function(tab) {
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');

        if (tab === 'login') {
            loginTab.classList.add('text-purple-600', 'border-purple-600');
            loginTab.classList.remove('text-gray-600');
            signupTab.classList.add('text-gray-600');
            signupTab.classList.remove('text-purple-600', 'border-purple-600');
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
        } else {
            signupTab.classList.add('text-purple-600', 'border-purple-600');
            signupTab.classList.remove('text-gray-600');
            loginTab.classList.add('text-gray-600');
            loginTab.classList.remove('text-purple-600', 'border-purple-600');
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        }
    };

    window.handleLogin = async function(event) {
        event.preventDefault();
        
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        try {
            await FirebaseAuth.login(email, password);
            window.location.href = 'buyer-dashboard.html';
        } catch (error) {
            alert('Login failed: ' + error.message);
        }
    };

    window.handleSignup = async function(event) {
        event.preventDefault();
        
        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const role = document.getElementById('signupRole').value;
        
        try {
            await FirebaseAuth.signup(email, password, name, role);
            alert('Account created! You earned 50 THB bonus!');
            window.location.href = role === 'seller' ? 'seller-dashboard.html' : 'buyer-dashboard.html';
        } catch (error) {
            alert('Signup failed: ' + error.message);
        }
    };

    window.handleGoogleLogin = async function() {
        try {
            await FirebaseAuth.signInWithGoogle();
            window.location.href = 'buyer-dashboard.html';
        } catch (error) {
            alert('Google sign-in failed: ' + error.message);
        }
    };
    </script>
</body>
</html>
