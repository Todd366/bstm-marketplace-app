<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BSTM Digital Nation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        #loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            text-align: center;
            z-index: 9999;
        }
        
        .loading-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #login-form {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
        }
        
        .logo-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .logo-section h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .logo-section p {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        
        .form-section {
            padding: 40px;
        }
        
        .btn-google {
            width: 100%;
            padding: 15px;
            background: white;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }
        
        .btn-google:hover {
            background: #f8f8f8;
            border-color: #667eea;
        }
        
        .btn-google:active {
            transform: scale(0.98);
        }
    </style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/auth.js"></script>
</head>
<body>
    
    <!-- Loading Overlay -->
    <div id="loading">
        <div class="loading-content">
            <div class="spinner"></div>
            <h2>Signing in...</h2>
            <p>Please wait while we authenticate you</p>
        </div>
    </div>

    <!-- Login Form -->
    <div id="login-form">
        <div class="logo-section">
            <div class="logo">B</div>
            <h1>BSTM</h1>
            <p>🇧🇼 Digital Nation</p>
        </div>
        
        <div class="form-section">
            <div style="text-align: center; margin-bottom: 20px;">
                <button onclick="signOutFirst()" style="background: transparent; border: 1px solid #ddd; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px;">
                    <i class="fas fa-sign-out-alt"></i> Sign Out First
                </button>
            </div>

            <button onclick="signInWithGoogle()" class="btn-google">
                <svg width="18" height="18" viewBox="0 0 18 18">
                    <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
                    <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
                    <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
                    <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
                </svg>
                Continue with Google
            </button>
            
            <p style="text-align: center; margin-top: 20px; color: #999; font-size: 14px;">
                By continuing, you agree to BSTM's Terms & Privacy Policy
            </p>
        </div>
    </div>

    <!-- Firebase Auth -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
