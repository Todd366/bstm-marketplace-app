<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitoring - BSTM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white">
    
    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold">System Health</h1>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-gray-400" id="lastUpdate">Last updated: --:--</span>
                <button onclick="location.reload()" class="bg-blue-600 px-4 py-2 rounded-lg">
                    <i class="fas fa-sync-alt mr-2"></i>Refresh
                </button>
            </div>
        </div>

        <!-- Status Overview -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-gray-800 rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-gray-400">Website</span>
                    <span id="websiteStatus" class="w-3 h-3 bg-green-500 rounded-full"></span>
                </div>
                <p class="text-3xl font-bold">Online</p>
                <p class="text-sm text-gray-400">99.9% uptime</p>
            </div>

            <div class="bg-gray-800 rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-gray-400">Database</span>
                    <span id="dbStatus" class="w-3 h-3 bg-green-500 rounded-full"></span>
                </div>
                <p class="text-3xl font-bold">Healthy</p>
                <p class="text-sm text-gray-400">12ms latency</p>
            </div>

            <div class="bg-gray-800 rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-gray-400">Payments</span>
                    <span id="paymentsStatus" class="w-3 h-3 bg-green-500 rounded-full"></span>
                </div>
                <p class="text-3xl font-bold">Active</p>
                <p class="text-sm text-gray-400">Paystack OK</p>
            </div>

            <div class="bg-gray-800 rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-gray-400">API</span>
                    <span id="apiStatus" class="w-3 h-3 bg-green-500 rounded-full"></span>
                </div>
                <p class="text-3xl font-bold">Running</p>
                <p class="text-sm text-gray-400">All endpoints OK</p>
            </div>
        </div>

        <!-- Real-time Metrics -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-gray-800 rounded-xl p-6">
                <h3 class="text-xl font-bold mb-4">Active Users (Last 24h)</h3>
                <p class="text-5xl font-bold text-green-400" id="activeUsers">--</p>
                <p class="text-sm text-gray-400 mt-2">Peak: 1,247 users</p>
            </div>

            <div class="bg-gray-800 rounded-xl p-6">
                <h3 class="text-xl font-bold mb-4">Response Time</h3>
                <p class="text-5xl font-bold text-blue-400" id="responseTime">--ms</p>
                <p class="text-sm text-gray-400 mt-2">Target: &lt;200ms</p>
            </div>
        </div>

        <!-- Recent Errors -->
        <div class="bg-gray-800 rounded-xl p-6">
            <h3 class="text-xl font-bold mb-4">Recent Errors (Last Hour)</h3>
            <div id="errorLog" class="space-y-2">
                <p class="text-gray-400 text-sm">No errors recorded</p>
            </div>
        </div>

    </div>

    <script>
    // Simulate real-time monitoring
    function updateMetrics() {
        document.getElementById('activeUsers').textContent = Math.floor(Math.random() * 500 + 800);
        document.getElementById('responseTime').textContent = Math.floor(Math.random() * 50 + 100);
        document.getElementById('lastUpdate').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
    }

    setInterval(updateMetrics, 5000);
    updateMetrics();
    </script>
</body>
</html>
