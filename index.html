<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSTM Digital Mall — Botswana</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap");

    * {
      font-family: "Inter", sans-serif;
      box-sizing: border-box;
    }

    body {
      background: #F8F7FF;
      margin: 0;
    }

    .shimmer {
      background: linear-gradient(90deg,#C4B5FD,#fff,#C4B5FD);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      from { background-position: 200% 0; }
      to { background-position: -200% 0; }
    }

    .room-card {
      transition: all .3s ease;
    }

    .room-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(124,58,237,.15);
    }
  </style>
</head>

<body>

  <!-- Universal Navigation -->
  <div id="bstm-nav"></div>

  <!-- HERO -->
  <section style="background:linear-gradient(135deg,#7C3AED,#4F46E5);padding:80px 24px 120px;text-align:center;">
    <div style="max-width:700px;margin:auto;">

      <h1 style="font-size:clamp(40px,6vw,68px);font-weight:900;color:#fff;">
        Every Business<br>
        <span class="shimmer">Has a Room</span>
      </h1>

      <p style="color:rgba(255,255,255,.8);font-size:18px;margin:20px 0 36px;">
        One digital mall. Every Botswana business.
      </p>

      <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;">

        <a href="marketplace.html"
           style="background:#fff;color:#7C3AED;padding:16px 36px;border-radius:16px;font-weight:700;text-decoration:none;">
          Browse Mall →
        </a>

        <a href="seller-dashboard.html"
           style="background:rgba(255,255,255,.15);border:1px solid #fff;color:#fff;padding:16px 36px;border-radius:16px;text-decoration:none;">
          Open Your Room
        </a>

      </div>

    </div>
  </section>

  <!-- STATS -->
  <section style="background:#fff;padding:24px;">
    <div style="display:flex;justify-content:center;gap:40px;flex-wrap:wrap;text-align:center;">
      <div><strong>63</strong><br>Rooms</div>
      <div><strong>1</strong><br>Open</div>
      <div><strong>THB</strong><br>Rewards</div>
      <div><strong>🇧🇼</strong><br>Botswana</div>
    </div>
  </section>

  <!-- FEATURED ROOM -->
  <section style="max-width:900px;margin:60px auto;padding:0 24px;text-align:center;">

    <h2 style="font-size:32px;font-weight:900;margin-bottom:24px;">
      Room 22 — The Farm
    </h2>

    <div class="room-card"
         onclick="location.href='room22-farm.html'"
         style="background:#fff;border-radius:24px;border:2px solid #6EE7B7;overflow:hidden;max-width:420px;margin:auto;cursor:pointer;">

      <div style="height:180px;background:linear-gradient(135deg,#059669,#34D399);display:flex;align-items:center;justify-content:center;font-size:70px;">
        🌾
      </div>

      <div style="padding:24px;text-align:left;">
        <h3 style="margin:0;font-size:22px;">The Farm</h3>

        <p style="margin:12px 0;color:#666;">
          Fresh produce and organic goods.
        </p>

        <span style="font-weight:700;color:#7C3AED;">
          Enter Room →
        </span>

      </div>

    </div>

  </section>

  <!-- Universal Footer -->
  <div id="bstm-footer"></div>

  <!-- Scripts -->
  <script src="components/smart-loader.js"></script>
  <script type="module" src="js/app.js"></script>

</body>
</html>
