<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSTM Digital Mall — Botswana</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap");
    * { font-family:"Inter",sans-serif; box-sizing:border-box; }

    .shimmer {
      background:linear-gradient(90deg,#C4B5FD,#fff,#C4B5FD);
      background-size:200%;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation: shimmer 3s linear infinite;
    }

    .room-card:hover {
      transform:translateY(-8px);
      box-shadow:0 20px 40px rgba(124,58,237,0.15);
    }
  </style>
</head>

<body style="background:#F8F7FF;">

<!-- ✅ FIX: must match loader expectation -->
<div id="bstm-nav"></div>

<!-- HERO -->
<div style="background:linear-gradient(135deg,#7C3AED,#4F46E5);padding:80px 24px 120px;text-align:center;">
  <div style="max-width:700px;margin:0 auto;">

    <h1 style="font-size:clamp(40px,6vw,68px);font-weight:900;color:#fff;">
      Every Business<br><span class="shimmer">Has a Room</span>
    </h1>

    <p style="color:rgba(255,255,255,0.75);font-size:18px;margin:20px 0 36px;">
      One digital mall. Every Botswana business.
    </p>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a href="marketplace.html"
         style="background:#fff;color:#7C3AED;padding:16px 36px;border-radius:16px;font-weight:800;text-decoration:none;">
        Browse Mall →
      </a>

      <a href="seller-dashboard.html"
         style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid #fff;padding:16px 36px;border-radius:16px;text-decoration:none;">
        Open Your Room
      </a>
    </div>

  </div>
</div>

<!-- STATS -->
<div style="background:#fff;padding:20px;text-align:center;">
  <div style="display:flex;gap:30px;justify-content:center;flex-wrap:wrap;">
    <div><b>63</b><br>Rooms</div>
    <div><b>1</b><br>Open</div>
    <div><b>THB</b><br>Rewards</div>
    <div><b>🇧🇼</b><br>Botswana</div>
  </div>
</div>

<!-- ROOM -->
<div style="max-width:800px;margin:60px auto;text-align:center;padding:0 24px;">
  <h2 style="font-size:28px;font-weight:900;">Room 22 — The Farm</h2>

  <div class="room-card"
       onclick="window.location.href='room22-farm.html'"
       style="background:#fff;border-radius:24px;overflow:hidden;border:2px solid #6EE7B7;cursor:pointer;max-width:400px;margin:20px auto;">

    <div style="height:160px;background:linear-gradient(135deg,#059669,#34D399);display:flex;align-items:center;justify-content:center;font-size:60px;">
      🌾
    </div>

    <div style="padding:20px;text-align:left;">
      <b>The Farm</b>
      <p style="font-size:13px;color:#666;">Fresh produce and organic goods</p>
      <span style="color:#7C3AED;font-weight:800;">Enter Room →</span>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div id="bstm-footer"></div>

<!-- SCRIPTS -->
<script src="components/smart-loader.js"></script>
<script src="js/fix-nav-loader.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
