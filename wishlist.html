<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - BSTM Marketplace</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="js/bstm-auth.js"></script>
</head>
<body class="bg-gray-50">
    
    <!-- Navigation -->
    <div id="bstm-nav"></div>

    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">
                <i class="fas fa-heart text-red-500 mr-3"></i>My Wishlist
            </h1>
            <p class="text-gray-600">Save your favorite products for later</p>
        </div>

        <!-- Wishlist Grid -->
        <div id="wishlistGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Items will be loaded here -->
        </div>

        <!-- Empty State -->
        <div id="emptyWishlist" class="hidden text-center py-20">
            <i class="fas fa-heart-broken text-gray-300 text-8xl mb-6"></i>
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Your wishlist is empty</h2>
            <p class="text-gray-600 mb-8">Start adding products you love!</p>
            <a href="index.html" class="inline-block bg-purple-600 hover:bg-purple-700 text-white px-8 py-4 rounded-xl font-bold text-lg">
                <i class="fas fa-shopping-bag mr-2"></i>Browse Products
            </a>
        </div>

    </div>

    <!-- Footer -->
    <div id="bstm-footer"></div>

    <script>
    // Wishlist management
    const Wishlist = {
        getItems() {
            return JSON.parse(localStorage.getItem('bstm_wishlist') || '[]');
        },
        
        addItem(product) {
            const items = this.getItems();
            if (!items.find(i => i.id === product.id)) {
                items.push(product);
                localStorage.setItem('bstm_wishlist', JSON.stringify(items));
                return true;
            }
            return false;
        },
        
        removeItem(productId) {
            const items = this.getItems().filter(i => i.id !== productId);
            localStorage.setItem('bstm_wishlist', JSON.stringify(items));
            loadWishlist();
        },
        
        clear() {
            localStorage.removeItem('bstm_wishlist');
            loadWishlist();
        }
    };

    function loadWishlist() {
        const items = Wishlist.getItems();
        const grid = document.getElementById('wishlistGrid');
        const empty = document.getElementById('emptyWishlist');

        if (items.length === 0) {
            grid.classList.add('hidden');
            empty.classList.remove('hidden');
            return;
        }

        grid.classList.remove('hidden');
        empty.classList.add('hidden');

        grid.innerHTML = items.map(item => `
            <div class="bg-white rounded-2xl shadow-lg overflow-hidden hover:shadow-2xl transition-all">
                <div class="relative">
                    <img src="${item.image || 'https://via.placeholder.com/400x300'}" alt="${item.name}" class="w-full h-48 object-cover">
                    <button onclick="Wishlist.removeItem('${item.id}')" class="absolute top-4 right-4 w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-lg hover:bg-red-50">
                        <i class="fas fa-heart text-red-500"></i>
                    </button>
                </div>
                <div class="p-5">
                    <h3 class="font-bold text-lg text-gray-800 mb-2">${item.name}</h3>
                    <p class="text-gray-600 text-sm mb-3">${item.description || ''}</p>
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <span class="text-2xl font-bold text-gray-800">P${item.price}</span>
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="moveToCart('${item.id}')" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg font-semibold">
                            <i class="fas fa-shopping-cart mr-2"></i>Add to Cart
                        </button>
                        <a href="product-detail.html?id=${item.id}" class="px-4 py-3 bg-gray-100 hover:bg-gray-200 rounded-lg flex items-center justify-center">
                            <i class="fas fa-eye"></i>
                        </a>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function moveToCart(productId) {
        const items = Wishlist.getItems();
        const product = items.find(i => i.id === productId);
        
        if (product) {
            // Add to cart
            let cart = JSON.parse(localStorage.getItem('bstm_cart') || '[]');
            cart.push(product);
            localStorage.setItem('bstm_cart', JSON.stringify(cart));
            
            // Remove from wishlist
            Wishlist.removeItem(productId);
            
            alert(`${product.name} moved to cart!`);
        }
    }

    // Load components
    function loadComponents() {
        fetch('components/universal-nav.html')
            .then(r => r.text())
            .then(html => document.getElementById('bstm-nav').innerHTML = html);

        fetch('components/universal-footer.html')
            .then(r => r.text())
            .then(html => document.getElementById('bstm-footer').innerHTML = html);
    }

    document.addEventListener('DOMContentLoaded', () => {
        BSTMAuth.requireAuth();
        loadWishlist();
        loadComponents();
    });

    // Export for global use
    window.Wishlist = Wishlist;
    </script>
</body>
</html>
