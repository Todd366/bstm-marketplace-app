<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist - BSTM</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap");
    * { font-family:"Inter",sans-serif; box-sizing:border-box; }
    .product-card { transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    .product-card:hover { transform:translateY(-6px); box-shadow:0 16px 40px rgba(124,58,237,0.15); }
  </style>
</head>
<body style="background:#F8F7FF;">
<div id="bstm-nav"></div>

<div style="max-width:1100px;margin:0 auto;padding:32px 20px 60px;">
  <div style="margin-bottom:32px;">
    <h1 style="font-size:32px;font-weight:900;color:#1E1B4B;margin:0 0 4px;"><i class="fas fa-heart" style="color:#EF4444;margin-right:10px;"></i>My Wishlist</h1>
    <p style="color:#9CA3AF;font-size:14px;margin:0;">Products you love, saved for later</p>
  </div>

  <!-- Auth wall -->
  <div id="auth-wall" style="display:none;text-align:center;padding:80px 20px;">
    <div style="font-size:56px;margin-bottom:16px;">🔒</div>
    <h2 style="font-size:22px;font-weight:900;color:#1E1B4B;margin-bottom:8px;">Login to see your wishlist</h2>
    <p style="color:#9CA3AF;margin-bottom:24px;">Save products you love and come back to them anytime</p>
    <a href="login.html" style="background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;padding:14px 32px;border-radius:14px;font-weight:800;text-decoration:none;">Login →</a>
  </div>

  <!-- Wishlist grid -->
  <div id="wishlist-content" style="display:none;">
    <div id="wishlist-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;"></div>
    <div id="empty-wishlist" style="display:none;text-align:center;padding:80px 20px;">
      <i class="fas fa-heart-broken" style="font-size:64px;color:#E5E7EB;margin-bottom:20px;display:block;"></i>
      <h2 style="font-size:22px;font-weight:900;color:#1E1B4B;margin-bottom:8px;">Your wishlist is empty</h2>
      <p style="color:#9CA3AF;margin-bottom:24px;">Start adding products you love!</p>
      <a href="marketplace.html" style="display:inline-block;background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;padding:14px 28px;border-radius:14px;font-weight:800;text-decoration:none;">Browse Mall</a>
    </div>
  </div>
</div>

<div id="bstm-footer"></div>
<script src="components/smart-loader.js"></script>
<script type="module" src="js/pages/wishlist.js"></script>
</body>
</html>
